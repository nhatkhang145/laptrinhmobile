# ==========================================
# CAU HINH KET NOI MySQL / Navicat
# ==========================================

# URL ket noi MySQL (zappy_db la ten database)
spring.datasource.url=jdbc:mysql://localhost:3306/zappy_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HIBERNATE - TU DONG TAO/CAP NHAT BANG SQL
# ==========================================
# update = tu dong tao bang neu chua co, cap nhat neu co thay doi
spring.jpa.hibernate.ddl-auto=update
# In ra cau SQL duoc chay (de debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# SERVER
# ==========================================
server.port=8080
spring.application.name=zappy-backend
