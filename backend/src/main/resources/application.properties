# GMAIL SMTP CONFIG
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Set bien moi truong tren Windows hoac nhap thang vao day de chay, username la dia chi mail ban dung de gui ma OTP, mat khau la App Password cua tai khoan Gmail do.
# Set bang cach dung lenh: setx MAIL_USERNAME "..." va setx MAIL_PASSWORD "..." trong CMD.
# Tao App Password tai: https://myaccount.google.com/apppasswords
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


