# ==========================================
# CẤU HÌNH KẾT NỐI DATABASE (MySQL)
# ==========================================

# Đường dẫn đến database: jdbc:mysql://[host]:[port]/[tên_database]
# createDatabaseIfNotExist=true: Tự động tạo DB zappy_db nếu chưa có
# serverTimezone=Asia/Ho_Chi_Minh: Đặt múi giờ Việt Nam
spring.datasource.url=jdbc:mysql://localhost:3306/zappy_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

# Tên đăng nhập vào MySQL (mặc định của XAMPP là root)
spring.datasource.username=root

# Mật khẩu vào MySQL (mặc định của XAMPP là để trống)
spring.datasource.password=

# Driver để Java kết nối và giao tiếp với MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HIBERNATE - TỰ ĐỘNG TẠO/CẬP NHẬT BẢNG SQL
# ==========================================
# update: Tự động tạo bảng nếu chưa có, thêm cột nếu Entity có thay đổi
spring.jpa.hibernate.ddl-auto=update

# In các câu lệnh SQL ra console (để debug)
spring.jpa.show-sql=true

# Format câu lệnh SQL in ra cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true

# Khai báo dùng MySQL để Hibernate sinh cú pháp SQL cho chuẩn
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# SERVER
# ==========================================
server.port=8080
spring.application.name=zappy-backend

